name: Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
        aws-region: ap-south-1

    - name: Login to ECR
      run: |
        aws ecr get-login-password --region ap-south-1 \
        | docker login --username AWS --password-stdin 455982475043.dkr.ecr.ap-south-1.amazonaws.com

    - name: Build Docker Image
      run: docker build -t tictactoe .

    - name: Tag Docker Image
      run: docker tag tictactoe:latest 455982475043.dkr.ecr.ap-south-1.amazonaws.com/tictactoe:latest

    - name: Push Docker Image
      run: docker push 455982475043.dkr.ecr.ap-south-1.amazonaws.com/tictactoe:latest
