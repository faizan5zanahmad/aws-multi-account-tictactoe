<!DOCTYPE html>
<html>
<head>
<title>Tic Tac Toe</title>

<style>
body{
font-family:Arial;
text-align:center;
}

.board{
display:grid;
grid-template-columns:repeat(3,100px);
gap:5px;
justify-content:center;
margin-top:30px;
}

.cell{
width:100px;
height:100px;
border:2px solid black;
font-size:40px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

#status{
margin-top:20px;
font-size:20px;
}
</style>
</head>

<body>

<h1>Tic Tac Toe - DEV to TEST to PROD </h1>

<div class="board" id="board">
<div class="cell" onclick="play(0)"></div>
<div class="cell" onclick="play(1)"></div>
<div class="cell" onclick="play(2)"></div>

<div class="cell" onclick="play(3)"></div>
<div class="cell" onclick="play(4)"></div>
<div class="cell" onclick="play(5)"></div>

<div class="cell" onclick="play(6)"></div>
<div class="cell" onclick="play(7)"></div>
<div class="cell" onclick="play(8)"></div>
</div>

<h2 id="status"></h2>

<button onclick="resetGame()">Reset Game</button>

<script>

let board = ["","","","","","","","",""]
let current = "X"

const wins = [
[0,1,2],
[3,4,5],
[6,7,8],
[0,3,6],
[1,4,7],
[2,5,8],
[0,4,8],
[2,4,6]
]

function play(index){

if(board[index] !== "") return

board[index] = current

document.getElementsByClassName("cell")[index].innerHTML=current

if(checkWinner()){
document.getElementById("status").innerHTML="Winner: "+current
return
}

current = current=="X"?"O":"X"

}

function checkWinner(){

for(let w of wins){

let [a,b,c] = w

if(board[a] && board[a]==board[b] && board[a]==board[c]){
return true
}

}

return false

}

function resetGame(){

board=["","","","","","","","",""]

current="X"

let cells=document.getElementsByClassName("cell")

for(let c of cells){
c.innerHTML=""
}

document.getElementById("status").innerHTML=""

}

</script>

</body>
</html>
